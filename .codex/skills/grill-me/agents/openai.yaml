interface:
  display_name: "Grill Me"
  short_description: "핵심 리스크를 제안 선택지와 자유입력으로 압박 질문하는 스킬"
  default_prompt: "Use $grill-me to ask only critical, handoff-changing pressure questions one at a time by default. Offer 2-3 suggested answer options, but accept my free-form answers as first-class input. If I ask for batch mode, ask the critical questions at once without applying the default 5-question budget, ordered by priority and dependency, while preserving the free-form answer path. In sequential mode, stop after 5 answered questions, ask whether to extend for up to 5 more, then turn the answers into a handoff-ready summary."
