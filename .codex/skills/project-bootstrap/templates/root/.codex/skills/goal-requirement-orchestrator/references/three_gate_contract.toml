main_gates = ["Plan", "Impl", "Review"]

[preconditions]
outside_three_gates = [
  "requirement_acceptance",
  "source_obligation_readiness",
  "coverage_ledger_readiness",
]

[lifecycle_completion]
outside_three_gates = [
  "closeout",
  "production_readiness",
]

[plan]
skill = "planning-orchestrator"
owned_subdecisions = [
  "research",
  "design_depth",
  "plan-design-review",
  "plan-ux-review",
  "plan-devex-review",
  "plan-eng-review",
  "scenario-brake",
  "secondary-plan",
]
design_depth_options = ["none", "inline", "full_artifact_required"]

[plan.top_level_removed_gates]
technical-design = "design_depth.full_artifact_required"

[plan.handoff]
path_rule = "plans/<plan-id>/plan_handoff.toml"
required_fields = [
  "accepted_plan_path",
  "design_depth",
  "invoked_subreviews",
  "deferred_items",
  "blockers",
  "verification_strategy",
  "stale_recheck_routing",
]

[impl]
skill = "impl-orchestrator"
requires = [
  "accepted_plan_handoff",
  "worktree_preflight",
  "scripts/init_worktree.sh",
  "context-loading",
  "tdd-workflow",
]

[review]
skill = "review-orchestrator"
lenses = ["visual", "ux", "devex"]
subagent_review_required_when_any_lens_triggers = true
parallel_lens_execution_supported = true
implementation_brake_consumes_review_evidence = true
implementation_brake = "required_after_post_implementation_reviews"
ship_prerequisite = "implementation-brake [SHIP]"

[review.lens_routes]
visual = "visual-qa-hardening"
ux = "ux-review"
devex = "devex-review"

[[fixtures.design_depth]]
id = "no_design_risk"
design_depth = "none"
passes_without_technical_design = true

[[fixtures.design_depth]]
id = "inline_notes"
design_depth = "inline"
passes_without_technical_design = true

[[fixtures.design_depth]]
id = "boundary_state_invariant_risk"
design_depth = "full_artifact_required"
passes_without_technical_design = false
requires_skill = "technical-design"

[[fixtures.review_lens]]
id = "visual_only"
lenses = ["visual"]
requires_subagent_review = true

[[fixtures.review_lens]]
id = "ux_only"
lenses = ["ux"]
requires_subagent_review = true

[[fixtures.review_lens]]
id = "devex_only"
lenses = ["devex"]
requires_subagent_review = true

[[fixtures.review_lens]]
id = "multi_lens"
lenses = ["visual", "ux", "devex"]
